<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAASOD Admin — หลังบ้าน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Prompt:wght@700;800;900&family=Fira+Code:wght@400;500&display=swap');

  :root {
    --bg:       #111408;
    --card:     #1A1F0A;
    --card2:    #22290E;
    --surface:  #2E3415;
    --accent:   #C9A227;
    --accent2:  #E8C96A;
    --accent-glow: rgba(201,162,39,0.22);
    --green:    #7EC47E;
    --red:      #FF3D5A;
    --orange:   #FF8C42;
    --blue:     #5BC8FF;
    --text:     #F0F4F8;
    --text2:    #BFC8D4;
    --muted:    #7A8896;
    --border:   #2E3415;
    --border2:  rgba(201,162,39,0.28);
    --shadow-sm:  0 2px 8px rgba(0,0,0,0.55);
    --shadow-md:  0 4px 20px rgba(0,0,0,0.65);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 22px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none; z-index: 0;
  }

  /* ══ LOGIN SCREEN ══ */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    background: var(--bg);
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    width: 360px;
    box-shadow: 0 0 60px rgba(201,162,39,0.12);
    text-align: center;
  }

  .login-logo {
    font-family: 'Prompt', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .login-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'Fira Code', monospace;
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--muted); font-family: 'Sarabun', sans-serif; }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #111408;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: 'Prompt', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-login:hover { background: var(--accent2); }
  .btn-login:active { transform: scale(0.98); }

  .login-err {
    color: var(--red);
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
  }

  /* ══ MAIN LAYOUT ══ */
  #main-screen { display: none; min-height: 100vh; }

  /* ── Top Bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(17,20,8,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border2);
    padding: 0 20px;
    display: flex; align-items: center; gap: 12px;
    height: 58px;
  }

  .topbar-logo {
    font-family: 'Prompt', sans-serif;
    font-size: 17px;
    font-weight: 900;
    color: var(--accent);
    margin-right: 4px;
    white-space: nowrap;
  }

  .topbar-badge {
    font-size: 10px;
    background: var(--surface);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-family: 'Fira Code', monospace;
  }

  .topbar-tabs {
    display: flex; gap: 4px;
    overflow-x: auto; flex: 1;
    scrollbar-width: none;
  }
  .topbar-tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn:hover { color: var(--text2); background: var(--card); }
  .tab-btn.active {
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid var(--border2);
  }
  .tab-icon { font-size: 15px; }

  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Sarabun', sans-serif;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ══ CONTENT AREA ══ */
  .content { padding: 24px 20px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ══ STAT CARDS ══ */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-value {
    font-family: 'Prompt', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* ══ SECTION HEADER ══ */
  .section-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Prompt', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }

  .section-count {
    font-size: 12px;
    background: var(--surface);
    color: var(--muted);
    padding: 2px 10px;
    border-radius: 99px;
    font-family: 'Fira Code', monospace;
  }

  /* ══ FILTER BAR ══ */
  .filter-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 16px; align-items: center;
  }

  .filter-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 14px;
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--muted); }

  .filter-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 14px;
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    outline: none;
    cursor: pointer;
  }

  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #111408; }
  .btn-primary:hover { background: var(--accent2); }

  .btn-success { background: var(--green); color: #111408; }
  .btn-success:hover { filter: brightness(1.1); }

  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { filter: brightness(1.15); }

  .btn-warning { background: var(--orange); color: #111408; }
  .btn-warning:hover { filter: brightness(1.1); }

  .btn-ghost {
    background: var(--card2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-sm { padding: 5px 12px; font-size: 13px; }

  /* ══ TABLE ══ */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    padding: 11px 14px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    white-space: nowrap;
  }

  td {
    padding: 11px 14px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(201,162,39,0.03); }

  /* ══ BADGES ══ */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
    font-family: 'Fira Code', monospace;
  }
  .badge-active { background: rgba(126,196,126,0.18); color: var(--green); }
  .badge-pending { background: rgba(255,140,66,0.18); color: var(--orange); }
  .badge-pro { background: rgba(201,162,39,0.18); color: var(--accent); }
  .badge-starter { background: rgba(122,136,150,0.18); color: var(--muted); }
  .badge-critical { background: rgba(255,61,90,0.18); color: var(--red); }
  .badge-warning { background: rgba(255,140,66,0.18); color: var(--orange); }
  .badge-ok { background: rgba(126,196,126,0.18); color: var(--green); }

  /* ══ MONEY DISPLAY ══ */
  .money { font-family: 'Fira Code', monospace; color: var(--accent2); font-weight: 600; }
  .money-big { font-family: 'Prompt', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); }

  /* ══ LOADING / EMPTY ══ */
  .loading-box {
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
    color: var(--muted);
    font-size: 14px;
    gap: 10px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-box {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ══ MODAL ══ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: 100%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal-title {
    font-family: 'Prompt', sans-serif;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--accent);
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* ══ TOAST ══ */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow-md);
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* ══ CHAT LOG ══ */
  .chat-shop-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .chat-shop-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .chat-shop-head:hover { background: var(--surface); }

  .chat-shop-name { font-weight: 700; font-size: 14px; }
  .chat-count { font-size: 12px; color: var(--muted); margin-left: auto; }

  .chat-logs-body { padding: 12px 16px; display: none; }
  .chat-logs-body.open { display: block; }

  .chat-row {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .chat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .chat-ts { font-size: 11px; color: var(--muted); font-family: 'Fira Code', monospace; margin-bottom: 4px; }
  .chat-user { font-size: 13px; color: var(--text2); margin-bottom: 3px; }
  .chat-user span { color: var(--accent); font-weight: 600; }
  .chat-ai { font-size: 13px; color: var(--green); }
  .chat-ai span { color: var(--text2); font-weight: 600; }

  /* ══ RESTOCK ══ */
  .restock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .restock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    transition: border-color 0.2s;
  }
  .restock-card.critical { border-color: rgba(255,61,90,0.4); }
  .restock-card.warning  { border-color: rgba(255,140,66,0.4); }

  .restock-shop { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--accent); }

  .restock-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .restock-item:last-child { border-bottom: none; }
  .restock-name { color: var(--text2); flex: 1; }
  .restock-stat { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--muted); }

  /* ══ SALES SUMMARY ══ */
  .shop-sale-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 14px;
    overflow: hidden;
  }

  .shop-sale-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .shop-sale-head:hover { background: var(--surface); }

  .shop-sale-name { font-weight: 700; font-size: 15px; flex: 1; }

  .shop-sale-body { padding: 14px 16px; display: none; }
  .shop-sale-body.open { display: block; }

  .sale-meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .sale-meta-item { text-align: center; }
  .sale-meta-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .sale-meta-val { font-family: 'Fira Code', monospace; font-size: 15px; color: var(--text); font-weight: 600; }

  /* ══ TREND ══ */
  .trend-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .trend-bar-label { font-size: 13px; color: var(--text2); min-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trend-bar-bg { flex: 1; height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; }
  .trend-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.6s; }
  .trend-bar-val { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--muted); min-width: 40px; text-align: right; }

  /* ══ DELETIONS ══ */
  .del-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .del-row:last-child { border-bottom: none; }
  .del-icon { font-size: 16px; flex-shrink: 0; padding-top: 1px; }
  .del-detail { flex: 1; }
  .del-shop { font-weight: 700; color: var(--accent); }
  .del-time { font-size: 11px; color: var(--muted); font-family: 'Fira Code', monospace; }
  .del-amt { font-family: 'Fira Code', monospace; color: var(--red); font-weight: 600; white-space: nowrap; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  /* ══ SCROLLBAR ══ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿 ค้าสด</div>
    <div class="login-sub">Admin Dashboard — หลังบ้าน</div>
    <input id="admin-key-input" class="login-input" type="password" placeholder="Admin Key" autocomplete="off">
    <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="main-screen">
  <div class="topbar">
    <div class="topbar-logo">🌿 ค้าสด</div>
    <span class="topbar-badge">ADMIN</span>
    <div class="topbar-tabs">
      <button class="tab-btn active" onclick="switchTab('dashboard')" id="tab-dashboard">
        <span class="tab-icon">📊</span> Dashboard
      </button>
      <button class="tab-btn" onclick="switchTab('users')" id="tab-users">
        <span class="tab-icon">🏪</span> ร้านค้า
      </button>
      <button class="tab-btn" onclick="switchTab('sales')" id="tab-sales">
        <span class="tab-icon">💰</span> ยอดขาย
      </button>
      <button class="tab-btn" onclick="switchTab('chatlogs')" id="tab-chatlogs">
        <span class="tab-icon">💬</span> Chat Logs
      </button>
      <button class="tab-btn" onclick="switchTab('restock')" id="tab-restock">
        <span class="tab-icon">📦</span> Restock
      </button>
      <button class="tab-btn" onclick="switchTab('trend')" id="tab-trend">
        <span class="tab-icon">🔥</span> Trend
      </button>
      <button class="tab-btn" onclick="switchTab('deletions')" id="tab-deletions">
        <span class="tab-icon">🗑️</span> ลบบิล
      </button>
    </div>
    <div class="topbar-right">
      <button class="btn-logout" onclick="doLogout()">ออก</button>
    </div>
  </div>

  <div class="content">

    <!-- ══ DASHBOARD ══ -->
    <div class="tab-panel active" id="panel-dashboard">
      <div class="stat-grid" id="dash-stats">
        <div class="loading-box" style="grid-column:1/-1"><div class="spinner"></div> กำลังโหลด...</div>
      </div>
      <div class="two-col">
        <div>
          <div class="section-head">
            <div class="section-title">รอ Approve</div>
          </div>
          <div id="dash-pending"></div>
        </div>
        <div>
          <div class="section-head">
            <div class="section-title">ยอดขายวันนี้</div>
          </div>
          <div id="dash-today-sales"></div>
        </div>
      </div>
    </div>

    <!-- ══ USERS ══ -->
    <div class="tab-panel" id="panel-users">

        <select class="filter-select" id="user-status-filter" onchange="filterUsers()">

    <!-- ══ RESTOCK ══ -->
    <div class="tab-panel" id="panel-restock">
      <div class="filter-bar">
        <button class="btn btn-ghost" onclick="loadRestock()">↺ รีเฟรช</button>

      <div id="restock-list">
        <div class="loading-box"><div class="spinner"></div> กำลังโหลด...</div>

    <!-- ══ TREND ══ -->
    <div class="tab-panel" id="panel-trend">

      <div class="two-col">

          <div id="trend-popular"></div>

        <div>
          <div class="section-head"><div class="section-title">🆕 เมนูใหม่มาแรง</div></div>

          <option value="1">วันนี้</option>
          <option value="7" selected>7 วัน</option>
          <option value="30">30 วัน</option>
        </select>
        <button class="btn btn-ghost" onclick="loadDeletions()">↺ รีเฟรช</button>
      </div>
      <div class="stat-grid" id="del-summary"></div>
      <div class="section-head" style="margin-top:8px">
        <div class="section-title">Log การลบบิล</div>

      <div id="del-list">

  </div><!-- /content -->
</div><!-- /main-screen -->

<!-- ══ MODAL: แก้ไขร้าน ══ -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-title">✏️ แก้ไขข้อมูลร้าน</div>
    <input type="hidden" id="edit-username">
    <div class="form-group">
      <label class="form-label">ชื่อร้าน</label>
      <input class="form-input" id="edit-shop-name">
    </div>
    <div class="form-group">
      <label class="form-label">เบอร์โทร</label>
      <input class="form-input" id="edit-phone">
    </div>
    <div class="form-group">
      <label class="form-label">แพ็กเกจ</label>
      <select class="form-select" id="edit-plan">
        <option value="starter">Starter — 199฿</option>
        <option value="pro">Pro — 399฿</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">สถานะ</label>
      <select class="form-select" id="edit-status">
        <option value="active">Active</option>
        <option value="pending">Pending</option>

      <button class="btn btn-ghost" onclick="closeModal('modal-edit')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="submitEdit()">บันทึก</button>

  </div>
</div>

<!-- ══ MODAL: Reset Password ══ -->
<div class="modal-overlay" id="modal-reset-pw">
  <div class="modal">
    <div class="modal-title">🔑 รีเซ็ตรหัสผ่าน</div>
    <input type="hidden" id="reset-username">
    <div class="form-group">
      <label class="form-label">รหัสผ่านใหม่</label>
      <input class="form-input" type="text" id="reset-pw" placeholder="อย่างน้อย 4 ตัวอักษร">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-reset-pw')">ยกเลิก</button>
      <button class="btn btn-warning" onclick="submitResetPw()">รีเซ็ต</button>
    </div>
  </div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let allUsers = [];
let currentTab = 'dashboard';

// ════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ════════════════════════════════════════════════════════
async function doLogin() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key})
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadDashboard();
    } else {
      document.getElementById('login-err').textContent = d.msg || 'รหัสไม่ถูกต้อง';
    }
  } catch(e) {
    document.getElementById('login-err').textContent = 'เชื่อมต่อ server ไม่ได้';
  }
}
document.getElementById('admin-key-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogout() {
  await fetch('/api/admin/logout', {method:'POST'});
  location.reload();
}

// ════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════
const tabLoaders = {
  dashboard: loadDashboard,
  users: loadUsers,
  sales: loadSales,
  chatlogs: loadChatLogs,
  restock: loadRestock,
  trend: loadTrend,
  deletions: loadDeletions,
};

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  currentTab = name;
  if (tabLoaders[name]) tabLoaders[name]();
}

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
async function loadDashboard() {
  const [usersData, salesData] = await Promise.all([
    api('/api/admin/users'),
    api('/api/admin/sales/today'),
  ]);

  // Stats
  const s = usersData?.summary || {};
  const ss = salesData?.summary || {};
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">ร้านทั้งหมด</div>
      <div class="stat-value">${s.total || 0}</div>
      <div class="stat-sub">สมัครใช้งาน</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active</div>
      <div class="stat-value" style="color:var(--green)">${s.active || 0}</div>
      <div class="stat-sub">ใช้งานอยู่</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">รอ Approve</div>
      <div class="stat-value" style="color:var(--orange)">${s.pending || 0}</div>
      <div class="stat-sub">รอยืนยัน</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">รายได้/เดือน</div>
      <div class="stat-value">${fmt(s.revenue || 0)}</div>
      <div class="stat-sub">บาท (ประมาณการ)</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ยอดขายวันนี้</div>
      <div class="stat-value">${fmt(ss.total || 0)}</div>
      <div class="stat-sub">${ss.bills || 0} บิล รวมทุกร้าน</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">เงินสด / โอน</div>
      <div class="stat-value" style="font-size:18px">${fmt(ss.cash||0)} / ${fmt(ss.transfer||0)}</div>
      <div class="stat-sub">บาท</div>
    </div>
  `;

  // Pending
  const pending = (usersData?.users||[]).filter(u => u.status === 'pending');
  if (pending.length === 0) {
    document.getElementById('dash-pending').innerHTML = '<div class="empty-box">✅ ไม่มีรอ Approve</div>';
  } else {
    document.getElementById('dash-pending').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>ร้าน</th><th>Plan</th><th>สมัคร</th><th></th></tr></thead>
          <tbody>${pending.map(u => `
            <tr>
              <td><div style="font-weight:700">${esc(u.shop_name)}</div><div style="font-size:12px;color:var(--muted)">${esc(u.username)} · ${esc(u.phone||'')}</div></td>
              <td><span class="badge badge-${u.plan}">${u.plan}</span></td>
              <td style="font-size:12px;color:var(--muted)">${esc(u.created_at||'')}</td>
              <td><button class="btn btn-success btn-sm" onclick="approveUser('${esc(u.username)}')">✓ Approve</button></td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>
    `;
  }

  // Today sales
  const shops = salesData?.shops || {};
  const topShops = Object.entries(shops).sort((a,b)=>b[1].total-a[1].total).slice(0,5);
  if (topShops.length === 0) {
    document.getElementById('dash-today-sales').innerHTML = '<div class="empty-box">ไม่มียอดขายวันนี้</div>';
  } else {
    document.getElementById('dash-today-sales').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>ร้าน</th><th>บิล</th><th>ยอด</th></tr></thead>
          <tbody>${topShops.map(([u,d])=>`
            <tr>
              <td><div style="font-weight:700">${esc(d.shop_name)}</div></td>
              <td style="color:var(--muted)">${d.bills}</td>
              <td class="money">${fmt(d.total)} ฿</td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>
    `;
  }
}

// ════════════════════════════════════════════════════════
// USERS
// ════════════════════════════════════════════════════════
async function loadUsers() {
  setHtml('users-table-wrap', loading());
  const data = await api('/api/admin/users');
  allUsers = data?.users || [];
  renderUsers(allUsers);
}

function filterUsers() {
  const q = document.getElementById('user-search').value.toLowerCase();
  const st = document.getElementById('user-status-filter').value;
  const pl = document.getElementById('user-plan-filter').value;
  const filtered = allUsers.filter(u => {
    const matchQ = !q || u.username.includes(q) || u.shop_name.toLowerCase().includes(q) || (u.phone||'').includes(q);
    const matchSt = !st || u.status === st;
    const matchPl = !pl || u.plan === pl;
    return matchQ && matchSt && matchPl;
  });
  renderUsers(filtered);
}

function renderUsers(users) {
  if (!users.length) {
    setHtml('users-table-wrap', '<div class="empty-box">ไม่พบร้านค้า</div>');
    return;
  }
  setHtml('users-table-wrap', `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ร้าน</th><th>Username</th><th>เบอร์</th>
            <th>Plan</th><th>สถานะ</th><th>AI วันนี้</th>
            <th>Last Sync</th><th>จัดการ</th>
          </tr>
        </thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td><div style="font-weight:700;font-size:14px">${esc(u.shop_name)}</div>
                  <div style="font-size:11px;color:var(--muted);font-family:'Fira Code',monospace">${esc(u.shop_id)}</div></td>
              <td style="font-family:'Fira Code',monospace;color:var(--accent2)">${esc(u.username)}</td>
              <td style="color:var(--muted)">${esc(u.phone||'-')}</td>
              <td><span class="badge badge-${u.plan}">${u.plan} ${u.price}฿</span></td>
              <td><span class="badge badge-${u.status}">${u.status}</span></td>
              <td style="text-align:center;font-family:'Fira Code',monospace">${u.ai_today||0}</td>
              <td style="font-size:12px;color:var(--muted)">${u.last_sync ? u.last_sync.substring(0,16) : '-'}</td>
              <td>
                <div style="display:flex;gap:5px;flex-wrap:nowrap">
                  ${u.status==='pending'
                    ? `<button class="btn btn-success btn-sm" onclick="approveUser('${esc(u.username)}')">✓</button>`
                    : `<button class="btn btn-warning btn-sm" onclick="suspendUser('${esc(u.username)}')">⏸</button>`}
                  <button class="btn btn-ghost btn-sm" onclick="openEdit(${JSON.stringify(u).replace(/'/g,"&#39;")})">✏️</button>
                  <button class="btn btn-ghost btn-sm" onclick="openResetPw('${esc(u.username)}')">🔑</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteUser('${esc(u.username)}','${esc(u.shop_name)}')">🗑</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div style="padding:10px 0;font-size:12px;color:var(--muted)">แสดง ${users.length} ร้าน</div>
  `);
}

async function approveUser(username) {
  const r = await api(`/api/admin/approve/${username}`, 'POST');
  toast(r?.msg || 'อนุมัติแล้ว', 'success');
  if (currentTab==='users') loadUsers();
  else loadDashboard();
}

async function suspendUser(username) {
  if (!confirm(`ระงับ ${username}?`)) return;
  const r = await api(`/api/admin/suspend/${username}`, 'POST');
  toast(r?.msg || 'ระงับแล้ว', 'success');
  loadUsers();
}

async function deleteUser(username, shopName) {
  if (!confirm(`⚠️ ลบร้าน "${shopName}" (${username}) จริงๆ ไหม?\nข้อมูลจะหายถาวร`)) return;
  const r = await api(`/api/admin/delete/${username}`, 'POST');
  toast(r?.msg || 'ลบแล้ว', 'success');
  loadUsers();
}

function openEdit(u) {
  document.getElementById('edit-username').value = u.username;
  document.getElementById('edit-shop-name').value = u.shop_name;
  document.getElementById('edit-phone').value = u.phone || '';
  document.getElementById('edit-plan').value = u.plan;
  document.getElementById('edit-status').value = u.status;
  openModal('modal-edit');
}

async function submitEdit() {
  const username = document.getElementById('edit-username').value;
  const r = await api(`/api/admin/edit/${username}`, 'POST', {
    shop_name: document.getElementById('edit-shop-name').value,
    phone:     document.getElementById('edit-phone').value,
    plan:      document.getElementById('edit-plan').value,
    status:    document.getElementById('edit-status').value,
  });
  toast(r?.msg || 'อัปเดตแล้ว', 'success');
  closeModal('modal-edit');
  loadUsers();
}

function openResetPw(username) {
  document.getElementById('reset-username').value = username;
  document.getElementById('reset-pw').value = '';
  openModal('modal-reset-pw');
}

async function submitResetPw() {
  const username = document.getElementById('reset-username').value;
  const password = document.getElementById('reset-pw').value.trim();
  if (!password) return toast('กรอกรหัสผ่านก่อน','error');
  const r = await api(`/api/admin/reset_password/${username}`, 'POST', {password});
  toast(r?.msg || 'รีเซ็ตแล้ว', 'success');
  closeModal('modal-reset-pw');
}

// ════════════════════════════════════════════════════════
// SALES
// ════════════════════════════════════════════════════════
async function loadSales() {
  setHtml('sales-list', loading());
  setHtml('sales-summary', '');
  const date = document.getElementById('sales-date').value;
  const days = document.getElementById('sales-days').value;
  const params = date ? `?date=${date}` : `?days=${days}`;
  const data = await api('/api/admin/sales'+params);

  const sum = data?.summary || {};
  setHtml('sales-summary', `
    <div class="stat-card"><div class="stat-label">ยอดรวม</div><div class="stat-value">${fmt(sum.total||0)}</div><div class="stat-sub">บาท</div></div>
    <div class="stat-card"><div class="stat-label">จำนวนบิล</div><div class="stat-value">${sum.bills||0}</div></div>
    <div class="stat-card"><div class="stat-label">เงินสด</div><div class="stat-value" style="color:var(--green)">${fmt(sum.cash||0)}</div></div>
    <div class="stat-card"><div class="stat-label">โอนเงิน</div><div class="stat-value" style="color:var(--blue)">${fmt(sum.transfer||0)}</div></div>
  `);

  const shops = data?.shops || {};
  const entries = Object.entries(shops).sort((a,b)=>b[1].total-a[1].total);
  if (!entries.length) { setHtml('sales-list','<div class="empty-box">ไม่มีข้อมูลยอดขาย</div>'); return; }

  setHtml('sales-list', entries.map(([username, d]) => `
    <div class="shop-sale-card">
      <div class="shop-sale-head" onclick="toggleEl('sale-body-${username}')">
        <div class="shop-sale-name">${esc(d.shop_name)}</div>
        <span class="badge badge-${d.plan}">${d.plan}</span>
        <span class="money" style="margin-left:auto">${fmt(d.total)} ฿</span>
        <span style="color:var(--muted);font-size:13px;margin-left:8px">${d.bills} บิล ▾</span>
      </div>
      <div class="shop-sale-body" id="sale-body-${username}">
        <div class="sale-meta-grid">
          <div class="sale-meta-item"><div class="sale-meta-label">ยอดรวม</div><div class="sale-meta-val money">${fmt(d.total)} ฿</div></div>
          <div class="sale-meta-item"><div class="sale-meta-label">เงินสด</div><div class="sale-meta-val">${fmt(d.cash)} ฿</div></div>
          <div class="sale-meta-item"><div class="sale-meta-label">โอน</div><div class="sale-meta-val">${fmt(d.transfer)} ฿</div></div>
          <div class="sale-meta-item"><div class="sale-meta-label">ฟรี</div><div class="sale-meta-val">${d.free||0} บิล</div></div>
          ${d.debt ? `<div class="sale-meta-item"><div class="sale-meta-label">หนี้ค้างชำระ</div><div class="sale-meta-val" style="color:var(--red)">${fmt(d.debt)} ฿</div></div>` : ''}
        </div>
        ${d.top_items?.length ? `
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:var(--muted);margin-bottom:8px">สินค้าขายดี</div>
            ${d.top_items.map(it=>`
              <div style="font-size:13px;color:var(--text2);padding:3px 0">
                ${esc(it.name)} <span style="color:var(--accent2);font-family:'Fira Code',monospace">×${it.qty}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
        ${d.sales?.length ? `
          <details>
            <summary style="font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:8px">ดู ${d.sales.length} บิลล่าสุด ▾</summary>
            <div class="table-wrap" style="margin-top:8px">
              <table>
                <thead><tr><th>เวลา</th><th>รายการ</th><th>ยอด</th><th>ชำระ</th></tr></thead>
                <tbody>${d.sales.slice().reverse().map(s=>`
                  <tr>
                    <td style="font-size:12px;font-family:'Fira Code',monospace;color:var(--muted)">${(s._ts||'').substring(11,16)}</td>
                    <td style="font-size:12px">${(s.items||[]).slice(0,3).map(it=>esc(it.name)).join(', ')}${(s.items||[]).length>3?'...':''}</td>
                    <td class="money" style="font-size:13px">${fmt(s.total)} ฿</td>
                    <td><span class="badge badge-${s.pay==='cash'?'ok':s.pay==='free'?'warning':'active'}">${s.pay||'-'}</span></td>
                  </tr>
                `).join('')}</tbody>
              </table>
            </div>
          </details>
        ` : ''}
      </div>
    </div>
  `).join(''));
}

// ════════════════════════════════════════════════════════
// CHAT LOGS
// ════════════════════════════════════════════════════════
async function loadChatLogs() {
  setHtml('chatlogs-list', loading());
  const data = await api('/api/admin/chat-logs');
  const shops = data?.data || {};
  const entries = Object.entries(shops).filter(([,d])=>d.logs?.length);
  if (!entries.length) { setHtml('chatlogs-list','<div class="empty-box">ไม่มี chat log</div>'); return; }

  setHtml('chatlogs-list', entries.map(([username, d])=>`
    <div class="chat-shop-block">
      <div class="chat-shop-head" onclick="toggleEl('chat-logs-${username}')">
        <span style="font-size:16px">💬</span>
        <span class="chat-shop-name">${esc(d.shop_name)}</span>
        <span class="badge badge-${d.plan}">${d.plan}</span>
        <span class="chat-count">${d.logs.length} รายการ ▾</span>
      </div>
      <div class="chat-logs-body" id="chat-logs-${username}">
        ${d.logs.map(l=>`
          <div class="chat-row">
            <div class="chat-ts">${l.ts||''}</div>
            <div class="chat-user"><span>User:</span> ${esc(l.user_msg||'')}</div>
            <div class="chat-ai"><span>AI:</span> ${esc(l.ai_reply||'').substring(0,200)}${(l.ai_reply||'').length>200?'…':''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join(''));
}

// ════════════════════════════════════════════════════════
// RESTOCK
// ════════════════════════════════════════════════════════
async function loadRestock() {
  setHtml('restock-list', loading());
  const data = await api('/api/admin/restock-alerts');
  const shops = data?.shops || [];
  if (!shops.length) {
    setHtml('restock-list','<div class="empty-box">✅ ไม่มีสต็อกวิกฤตในขณะนี้</div>');
    return;
  }
  setHtml('restock-list', `
    <div style="margin-bottom:12px;color:var(--muted);font-size:13px">พบ ${shops.length} ร้านที่มีสต็อกน่าเป็นห่วง</div>
    <div class="restock-grid">
      ${shops.map(s=>`
        <div class="restock-card ${s.alerts.some(a=>a.urgency==='critical')?'critical':'warning'}">
          <div class="restock-shop">🏪 ${esc(s.shop_name)}</div>
          ${s.alerts.map(a=>`
            <div class="restock-item">
              <span class="badge badge-${a.urgency}" style="margin-right:8px;flex-shrink:0">${a.urgency==='critical'?'🔴':'🟡'}</span>
              <span class="restock-name">${esc(a.product_name)}</span>
              <span class="restock-stat">เหลือ ${a.current_stock} | ~${Math.round(a.days_left)} วัน</span>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `);
}

// ════════════════════════════════════════════════════════
// TREND
// ════════════════════════════════════════════════════════
async function loadTrend() {
  setHtml('trend-popular','<div class="loading-box"><div class="spinner"></div></div>');
  setHtml('trend-new-menus','<div class="loading-box"><div class="spinner"></div></div>');
  const days = document.getElementById('trend-days').value;
  const [pop, menus] = await Promise.all([
    api(`/api/admin/popular-items?days=${days}&limit=20`),
    api(`/api/admin/new-menus?days=${days}&limit=30`),
  ]);

  const items = pop?.global_top || [];
  const maxQty = items[0]?.qty || 1;
  setHtml('trend-popular', items.length
    ? `<div class="table-wrap" style="padding:16px">` +
      items.map((it,i)=>`
        <div class="trend-bar-wrap">
          <div class="trend-bar-label">${i+1}. ${esc(it.name)}</div>
          <div class="trend-bar-bg"><div class="trend-bar-fill" style="width:${Math.round(it.qty/maxQty*100)}%"></div></div>
          <div class="trend-bar-val">${it.qty}</div>
        </div>
      `).join('') + `</div>`
    : '<div class="empty-box">ไม่มีข้อมูล</div>'
  );

  const trend = menus?.trend || [];
  const maxAdd = trend[0]?.total_additions || 1;
  setHtml('trend-new-menus', trend.length
    ? `<div class="table-wrap" style="padding:16px">` +
      trend.map(it=>`
        <div class="trend-bar-wrap">
          <div class="trend-bar-label">${esc(it.item_name)}</div>
          <div class="trend-bar-bg"><div class="trend-bar-fill" style="width:${Math.round(it.total_additions/maxAdd*100)}%;background:var(--green)"></div></div>
          <div class="trend-bar-val" style="color:var(--green)">${it.shop_count}ร้าน</div>
        </div>
      `).join('') + `</div>`
    : '<div class="empty-box">ไม่มีข้อมูล</div>'
  );
}

// ════════════════════════════════════════════════════════
// BILL DELETIONS
// ════════════════════════════════════════════════════════
async function loadDeletions() {
  setHtml('del-list', loading());
  setHtml('del-summary','');
  const days = document.getElementById('del-days').value;
  const data = await api(`/api/admin/bill-deletions?days=${days}&limit=300`);

  const summary = data?.shops_summary || [];
  setHtml('del-summary', summary.length ? summary.slice(0,4).map(s=>`
    <div class="stat-card">
      <div class="stat-label" style="color:var(--red)">${esc(s.shop_name||s.shop_id)}</div>
      <div class="stat-value" style="color:var(--red)">${s.count}</div>
      <div class="stat-sub">ลบไป ${fmt(s.total_amt)} ฿</div>
    </div>
  `).join('') : '');

  const logs = data?.logs || [];
  if (!logs.length) { setHtml('del-list','<div class="empty-box">ไม่มีการลบบิลในช่วงนี้ ✅</div>'); return; }

  setHtml('del-list', `
    <div class="section-head">
      <div class="section-title">ทั้งหมด ${data.total_deletions} รายการ</div>
    </div>
    <div class="table-wrap">
      <div style="padding:14px 16px">
        ${logs.map(l=>`
          <div class="del-row">
            <div class="del-icon">🗑️</div>
            <div class="del-detail">
              <div class="del-shop">${esc(l.shop_name||l.shop_id)} <span style="color:var(--muted);font-size:12px">@${esc(l.username||'')}</span></div>
              <div style="font-size:13px;color:var(--text2)">บิลเวลา ${esc(l.bill_time||'-')} · ${esc(l.bill_pay||'-')}</div>
              <div class="del-time">${fmtTs(l.deleted_at)}</div>
            </div>
            <div class="del-amt">${fmt(l.bill_total||0)} ฿</div>
          </div>
        `).join('')}
      </div>
    </div>
  `);
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
async function api(url, method='GET', body=null) {
  try {
    const opts = {method, headers:{'Content-Type':'application/json'}};
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    return await r.json();
  } catch(e) {
    toast('เชื่อมต่อ server ไม่ได้','error');
    return null;
  }
}

function fmt(n) { return Number(n).toLocaleString('th-TH'); }

function fmtTs(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleString('th-TH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return ts; }
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setHtml(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function loading() {
  return '<div class="loading-box"><div class="spinner"></div> กำลังโหลด...</div>';
}

function toggleEl(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// ── Toast ──
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.className='', 2800);
}

// ── Set today's date as default ──
document.getElementById('sales-date').value = new Date().toISOString().substring(0,10);
</script>
